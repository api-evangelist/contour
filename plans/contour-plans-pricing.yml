specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Contour
providerId: contour
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Envoy
  - Ingress Controller
  - Kubernetes
  - Networking
  - Open Source
  - Proxy
description: Contour is an open-source Kubernetes ingress controller and a CNCF Incubating project,
  released under the Apache 2.0 license. There is no commercial offering or paid plan published by
  the upstream Contour project; the software is free to download, run, and modify. Operators who want
  commercial support typically obtain it indirectly through their Kubernetes distribution vendor (e.g.
  VMware Tanzu, RedHat) rather than through a Contour-branded paid plan.
sources:
  - https://projectcontour.io/
  - https://github.com/projectcontour/contour
  - https://www.cncf.io/projects/contour/
plans:
  - id: contour-open-source
    name: Open Source
    type: freemium
    description: Apache 2.0 licensed open-source release of Contour. Free to use, modify, and distribute.
      No commercial pricing applies.
    entries:
      - label: Software license
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 license
      - name: CNCF Incubating project
      - name: Community support via GitHub
      - name: Contour HTTPProxy API
      - name: Contour Gateway API
      - name: Contour Kubernetes Ingress API
      - name: Contour ExtensionService API
      - name: Contour Configuration API
notes: Contour is an open-source CNCF Incubating project with no upstream commercial pricing. The "API
  surface" is a Kubernetes Custom Resource API consumed in-cluster, not a hosted service that meters
  requests. Reconciled is false because there is no provider-published pricing to reconcile against.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
